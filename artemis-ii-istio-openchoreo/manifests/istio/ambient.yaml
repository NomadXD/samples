# Enable Istio ambient mesh on all mission Cell namespaces.
# Applied AFTER OpenChoreo creates the runtime namespaces.
#
# Step 1: Label each namespace to enroll in ambient mesh:
#
#   kubectl label namespace <ns> istio.io/dataplane-mode=ambient
#
# Step 2: Apply this NetworkPolicy to each namespace.
#
# OpenChoreo auto-generates NetworkPolicies for each component that only
# allow traffic on the application port (e.g., 8080). Istio ambient's
# ztunnel uses port 15008 (HBONE) for mTLS-encrypted tunneling between
# pods. Without this NetworkPolicy, ztunnel's HBONE connections are
# blocked and cross-cell traffic fails.
#
# Step 3: Restart deployments in each namespace so pods get enrolled:
#
#   kubectl rollout restart deployment -n <ns>
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-istio-ambient
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 15008
          protocol: TCP
        - port: 15006
          protocol: TCP
        - port: 15001
          protocol: TCP
        - port: 15053
          protocol: TCP
        - port: 15053
          protocol: UDP
