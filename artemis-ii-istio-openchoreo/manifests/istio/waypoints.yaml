# Waypoint proxies for L7 policy enforcement.
# Deploy one waypoint per mission Cell namespace to enable
# AuthorizationPolicy, fault injection, and L7 telemetry.
#
# Usage:
#   istioctl waypoint apply -n <namespace> --name mission-waypoint
#
# Or declaratively:
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mission-waypoint
  labels:
    istio.io/waypoint-for: service
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
