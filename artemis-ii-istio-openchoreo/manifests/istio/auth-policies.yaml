# Istio AuthorizationPolicies for the Artemis II mission.
#
# These enforce L7 access control within each Cell, complementing
# OpenChoreo's L4 NetworkPolicies. The waypoint proxy evaluates
# these rules based on SPIFFE identity and HTTP attributes.
#
# Key design: OpenChoreo deploys all components with the namespace's
# `default` ServiceAccount. The adversary uses a dedicated `adversary` SA.
# We use targeted DENY policies to block the adversary SA, and ALLOW
# policies matching by namespace for legitimate intra/cross-cell traffic.
#
# Istio evaluates DENY before ALLOW, so the adversary is always blocked
# even though its namespace is in the ALLOW list.
#
# Usage:
#   Replace HOUSTON_NS, ORION_NS, DSN_NS, KENNEDY_NS with the actual
#   dp-default-<project>-development-<hash> namespace names.

---
# ============================================================
# HOUSTON CELL
# ============================================================

# DENY: Block adversary SA from reaching flight-director
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-adversary
  namespace: HOUSTON_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: flight-director
  action: DENY
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/HOUSTON_NS/sa/adversary"]

---
# ALLOW: Legitimate access to flight-director
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: flight-director-policy
  namespace: HOUSTON_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: flight-director
  action: ALLOW
  rules:
    # Istio gateway (external dashboard traffic)
    - from:
        - source:
            principals: ["cluster.local/ns/openchoreo-data-plane/sa/*"]
    # Intra-cell (capcom, telemetry-monitor, flight-dynamics)
    - from:
        - source:
            namespaces: ["HOUSTON_NS"]
    # Kennedy launch-control for handoff
    - from:
        - source:
            namespaces: ["KENNEDY_NS"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/decision/go-nogo"]

---
# ============================================================
# ORION CELL
# ============================================================

# DENY: Block adversary SA from guidance-nav
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-adversary-gn
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: guidance-nav
  action: DENY
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/adversary"]

---
# DENY: Block adversary SA from life-support (classified crew data)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-adversary-ls
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: life-support
  action: DENY
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/adversary"]

---
# DENY: Block adversary SA from comms-system
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-adversary-cs
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: comms-system
  action: DENY
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/adversary"]

---
# ALLOW: Legitimate access to comms-system
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: comms-system-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: comms-system
  action: ALLOW
  rules:
    # Houston can uplink commands
    - from:
        - source:
            namespaces: ["HOUSTON_NS"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/uplink", "/uplink/*"]
    # DSN can request downlink
    - from:
        - source:
            namespaces: ["DSN_NS"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/downlink"]
        - operation:
            methods: ["GET"]
            paths: ["/signal/strength"]
    # Intra-cell (other Orion subsystems)
    - from:
        - source:
            namespaces: ["ORION_NS"]

---
# ALLOW: Guidance-nav only from within Orion cell
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: guidance-nav-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: guidance-nav
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["ORION_NS"]

---
# ALLOW: Life-support only from within Orion cell (classified crew data)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: life-support-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: life-support
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["ORION_NS"]

---
# ============================================================
# DSN CELL
# ============================================================

# ALLOW: Signal router accepts from Orion, Houston, intra-cell, and gateway
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: signal-router-policy
  namespace: DSN_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: signal-router
  action: ALLOW
  rules:
    # Orion can send telemetry
    - from:
        - source:
            namespaces: ["ORION_NS"]
    # Houston can read status
    - from:
        - source:
            namespaces: ["HOUSTON_NS"]
      to:
        - operation:
            methods: ["GET"]
    # Intra-cell (antenna handover)
    - from:
        - source:
            namespaces: ["DSN_NS"]
    # Gateway (dashboard access)
    - from:
        - source:
            principals: ["cluster.local/ns/openchoreo-data-plane/sa/*"]
