# Istio AuthorizationPolicies for the Artemis II mission.
#
# Zero-trust model: ALLOW only known identities. Everything else
# is implicitly denied — no DENY policies needed.
#
# OpenChoreo deploys all components with the namespace's `default`
# ServiceAccount. Istio ambient assigns each pod a SPIFFE identity:
#   cluster.local/ns/<namespace>/sa/default
#
# The adversary uses a dedicated `adversary` SA, so its identity is:
#   cluster.local/ns/<namespace>/sa/adversary
#
# Since the ALLOW rules only match `sa/default`, the adversary
# (or any other unknown SA) is automatically denied — we don't
# need to know who the attacker is, only who the legitimate callers are.
#
# Usage:
#   Replace HOUSTON_NS, ORION_NS, DSN_NS, KENNEDY_NS with the actual
#   dp-default-<project>-development-<hash> namespace names.

---
# ============================================================
# HOUSTON CELL
# ============================================================

# flight-director: the mission authority
# Allowed: gateway (dashboard), Houston intra-cell, Kennedy handoff
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: flight-director-policy
  namespace: HOUSTON_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: flight-director
  action: ALLOW
  rules:
    # Istio gateway (external dashboard traffic)
    - from:
        - source:
            principals: ["cluster.local/ns/openchoreo-data-plane/sa/*"]
    # Intra-cell: only default SA (capcom, telemetry-monitor, etc.)
    - from:
        - source:
            principals: ["cluster.local/ns/HOUSTON_NS/sa/default"]
    # Kennedy launch-control for handoff
    - from:
        - source:
            principals: ["cluster.local/ns/KENNEDY_NS/sa/default"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/decision/go-nogo"]

---
# ============================================================
# ORION CELL
# ============================================================

# comms-system: the spacecraft's communication link
# Allowed: Houston (uplink commands), DSN (downlink), Orion intra-cell
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: comms-system-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: comms-system
  action: ALLOW
  rules:
    # Houston can uplink commands
    - from:
        - source:
            principals: ["cluster.local/ns/HOUSTON_NS/sa/default"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/uplink", "/uplink/*"]
    # DSN can request downlink
    - from:
        - source:
            principals: ["cluster.local/ns/DSN_NS/sa/default"]
      to:
        - operation:
            methods: ["POST"]
            paths: ["/downlink"]
        - operation:
            methods: ["GET"]
            paths: ["/signal/strength"]
    # Intra-cell: only default SA
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/default"]

---
# guidance-nav: critical navigation system
# Allowed: Orion intra-cell only (commands must go through comms-system)
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: guidance-nav-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: guidance-nav
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/default"]

---
# life-support: classified crew health data
# Allowed: Orion intra-cell only
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: life-support-policy
  namespace: ORION_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: life-support
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/default"]

---
# ============================================================
# DSN CELL
# ============================================================

# signal-router: telemetry relay between Orion and Houston
# Allowed: Orion (telemetry push), Houston (read), DSN intra-cell, gateway
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: signal-router-policy
  namespace: DSN_NS
spec:
  targetRefs:
    - kind: Service
      group: ""
      name: signal-router
  action: ALLOW
  rules:
    # Orion can send telemetry
    - from:
        - source:
            principals: ["cluster.local/ns/ORION_NS/sa/default"]
    # Houston can read status
    - from:
        - source:
            principals: ["cluster.local/ns/HOUSTON_NS/sa/default"]
      to:
        - operation:
            methods: ["GET"]
    # Intra-cell (antenna handover)
    - from:
        - source:
            principals: ["cluster.local/ns/DSN_NS/sa/default"]
    # Gateway (dashboard access)
    - from:
        - source:
            principals: ["cluster.local/ns/openchoreo-data-plane/sa/*"]
