# Orion Spacecraft - 4 components
---
# Guidance & Navigation - IMU, star tracker, burns
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: guidance-nav
  namespace: default
spec:
  owner:
    projectName: orion
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  environmentConfigs:
    - environmentName: development
      resources:
        requests:
          cpu: "5m"
          memory: "16Mi"
        limits:
          cpu: "25m"
          memory: "32Mi"
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: guidance-nav-workload
  namespace: default
spec:
  owner:
    componentName: guidance-nav
    projectName: orion
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [project]
  container:
    image: "nomadxd/artemis-demo:latest"
    env:
      - key: CONFIG_PATH
        value: "config/orion-guidance-nav.yaml"
