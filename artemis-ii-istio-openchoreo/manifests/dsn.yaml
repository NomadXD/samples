# Deep Space Network - 4 components
---
# Signal Router - routes signals between stations
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: signal-router
  namespace: default
spec:
  owner:
    projectName: deep-space-network
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: signal-router-workload
  namespace: default
spec:
  owner:
    componentName: signal-router
    projectName: deep-space-network
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [namespace]
  container:
    image: "artemis-demo:latest"
    env:
      - key: CONFIG_PATH
        value: "config/dsn-signal-router.yaml"
