# Kennedy Space Center - 4 components
---
# Launch Control - manages countdown and handoff
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: launch-control
  namespace: default
spec:
  owner:
    projectName: kennedy
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  environmentConfigs:
    - environmentName: development
      resources:
        requests:
          cpu: "5m"
          memory: "16Mi"
        limits:
          cpu: "25m"
          memory: "32Mi"
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: launch-control-workload
  namespace: default
spec:
  owner:
    componentName: launch-control
    projectName: kennedy
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [namespace]
  container:
    image: "nomadxd/artemis-demo:latest"
    env:
      - key: CONFIG_PATH
        value: "config/kennedy-launch-control.yaml"
