# Houston Mission Control - 4 components
---
# Flight Director - the authority, serves the dashboard UI
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: flight-director
  namespace: default
spec:
  owner:
    projectName: houston
  autoDeploy: true
  componentType:
    kind: ClusterComponentType
    name: deployment/service
  environmentConfigs:
    - environmentName: development
      resources:
        requests:
          cpu: "5m"
          memory: "16Mi"
        limits:
          cpu: "25m"
          memory: "32Mi"
---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: flight-director-workload
  namespace: default
spec:
  owner:
    componentName: flight-director
    projectName: houston
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [external]
  container:
    image: "nomadxd/artemis-demo:latest"
    env:
      - key: CONFIG_PATH
        value: "config/houston-flight-director.yaml"
---
