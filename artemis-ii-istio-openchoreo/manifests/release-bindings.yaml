# ReleaseBindings - environment-specific resource overrides for all components
# These override the default 100m/256Mi from the ClusterComponentType

# --- Houston ---
---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: flight-director-development
  namespace: default
spec:
  owner:
    projectName: houston
    componentName: flight-director
  environment: development
  componentTypeEnvironmentConfigs:
    resources:
      requests:
        cpu: "5m"
        memory: "16Mi"
      limits:
        cpu: "25m"
        memory: "32Mi"
---
