identity: launch-control
cell: kennedy
port: 8080
serveUI: false

endpoints:
  - method: POST
    path: /countdown/start
    response:
      status: initiated
      t-minus: "00:10:00"
      message: "Launch countdown initiated from LC-39B"
      pad: "LC-39B"

  - method: POST
    path: /countdown/hold
    response:
      status: holding
      reason: "requested by flight director"
      resumable: true

  - method: GET
    path: /countdown/status
    response:
      status: nominal
      t-minus: "00:00:00"
      holds: 0
      pad: "LC-39B"

  - method: POST
    path: /handoff
    response:
      status: handoff-complete
      from: "kennedy/launch-control"
      to: "houston/flight-director"
      message: "Launch control authority transferred to Houston at T+00:00:05"
